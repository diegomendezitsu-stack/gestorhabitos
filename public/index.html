<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitRPG - Gestor de Hábitos 🎮</title>
    <link rel="stylesheet" href="diseno-profesional.css">
</head>
<body>

    <header class="player-dashboard">
        <div class="profile-info">
            <div class="avatar">🧙‍♂️</div>
            <div>
                <h2 id="player-name">Cargando Jugador...</h2>
                <div class="level-badge">Nivel <span id="player-level">1</span></div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-bar-container">
                <span class="stat-label">XP: <span id="xp-text">0/100</span></span>
                <div class="stat-bar"><div id="xp-fill" class="fill xp" style="width: 0%"></div></div>
            </div>
            <div class="gold-container">
                <span class="gold-icon">🪙</span> <span id="player-gold">0</span> Oro
            </div>
        </div>
    </header>

    <main class="main-container">
        <section class="habits-section">
            <h3>⚔️ Tus Misiones Diarias (Hábitos)</h3>
            
            <form id="habit-form" class="habit-form">
                <input type="text" id="habit-name" placeholder="Nueva misión (ej: Leer 15 min)" required>
                <select id="habit-difficulty">
                    <option value="FACIL">Fácil (10 XP)</option>
                    <option value="MEDIA">Media (20 XP)</option>
                    <option value="DIFICIL">Difícil (40 XP)</option>
                </select>
                <button type="submit">+ Añadir</button>
            </form>
            <ul id="habits-list" class="habits-list">
                </ul>
        </section>

        <section class="shop-section">
            <h3>🏪 Tienda de Recompensas</h3>
            <div class="shop-items">
                <div class="shop-item">
                    <span>📺 Ver 1 capítulo de Netflix</span>
                    <button class="btn-buy">🪙 30 Oro</button>
                </div>
                <div class="shop-item">
                    <span>🍦 Comer un postre/antojo</span>
                    <button class="btn-buy">🪙 50 Oro</button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
