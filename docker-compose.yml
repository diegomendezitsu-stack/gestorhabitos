version: '3.8'

services:
  app:
    build: .
    container_name: habitlife
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  logs:
